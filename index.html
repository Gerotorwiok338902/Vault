<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>VAULT</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oxanium:wght@800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
input,textarea{-webkit-user-select:text;user-select:text;}
html,body{height:100%;background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace;}

/* LOGIN */
#login{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:100;overflow-y:auto;}
#login.hide{display:none;}
.logo{font-family:'Oxanium',sans-serif;font-size:58px;font-weight:800;letter-spacing:14px;color:#fff;line-height:1;text-align:center;}
.logo-sub{font-size:8px;letter-spacing:5px;color:#004466;text-transform:uppercase;text-align:center;margin-top:6px;}
.form{width:100%;max-width:320px;margin-top:32px;display:flex;flex-direction:column;gap:14px;}
.lbl{font-size:8px;letter-spacing:4px;color:#0077aa;text-transform:uppercase;margin-bottom:5px;}
.inp{width:100%;background:#000;border:none;border-bottom:1px solid #003344;color:#fff;font-family:'Share Tech Mono',monospace;font-size:15px;padding:12px 10px;outline:none;-webkit-appearance:none;border-radius:0;transition:border-color .2s;}
.inp:focus{border-bottom-color:#00ccff;}
.inp::placeholder{color:#222;}
.err{font-size:9px;color:#ff3355;letter-spacing:2px;text-align:center;min-height:14px;text-transform:uppercase;}
.btn-go{width:100%;background:transparent;border:1px solid #00ccff;color:#00ccff;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:8px;text-transform:uppercase;padding:14px;cursor:pointer;border-radius:0;transition:all .2s;margin-top:4px;}
.btn-go:hover,.btn-go:active{background:#00ccff;color:#000;}
.btn-go:disabled{opacity:.25;pointer-events:none;}
.note{font-size:8px;color:#003344;letter-spacing:2px;text-align:center;margin-top:24px;line-height:2.4;text-transform:uppercase;}

/* CONNECTING */
#conn{position:fixed;inset:0;background:#000;z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#conn.on{display:flex;}
.spin{width:34px;height:34px;border:1px solid #222;border-top-color:#00ccff;border-radius:50%;animation:sp 1s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
#conn p{font-size:9px;letter-spacing:4px;color:#005577;text-transform:uppercase;}

/* CHAT */
#chat{position:fixed;inset:0;display:none;flex-direction:column;background:#000;}
#chat.on{display:flex;}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid #0a1a22;flex-shrink:0;}
.hdr-l .t{font-size:10px;font-weight:700;letter-spacing:6px;color:#00ccff;text-transform:uppercase;}
.hdr-l .r{font-size:8px;color:#0077aa;letter-spacing:2px;margin-top:2px;}
.hdr-r{display:flex;align-items:center;gap:12px;}

.pres{display:flex;align-items:center;gap:5px;}
.pres-ico{font-size:12px;}
#pres-count{font-size:13px;color:#00ccff;font-weight:bold;}
#pres-names{font-size:7px;color:#005577;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

#sdot{width:6px;height:6px;border-radius:50%;background:#555;transition:background .4s;flex-shrink:0;}
#sdot.ok{background:#00ff88;box-shadow:0 0 6px #00ff88;animation:bl 2.5s infinite;}
#sdot.err{background:#ff3355;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

.btn-exit{background:none;border:1px solid #0a1a22;color:#0077aa;font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:3px;padding:6px 12px;cursor:pointer;text-transform:uppercase;transition:all .2s;border-radius:0;}
.btn-exit:hover{border-color:#ff3355;color:#ff3355;}

/* MESSAGES */
#msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
#msgs::-webkit-scrollbar{width:2px;}
#msgs::-webkit-scrollbar-thumb{background:#002233;}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.empty-i{font-size:26px;opacity:.12;}
.empty-t{font-size:8px;letter-spacing:3px;color:#003344;text-transform:uppercase;}

.mw{display:flex;flex-direction:column;gap:3px;animation:mn .15s ease;}
@keyframes mn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.mw.me{align-items:flex-end;}
.mw.them{align-items:flex-start;}
.meta{font-size:8px;letter-spacing:2px;color:#0088bb;text-transform:uppercase;}
.mtime{color:#005577;}
.mw.me .mb{max-width:82%;padding:10px 14px;font-size:14px;line-height:1.6;word-break:break-word;background:#003355;border:1px solid #0066aa;color:#fff;border-radius:2px 0 2px 2px;}
.mw.them .mb{max-width:82%;padding:10px 14px;font-size:14px;line-height:1.6;word-break:break-word;background:#060f18;border:1px solid #0a2030;color:#fff;border-radius:0 2px 2px 2px;}

/* INPUT */
.ch-in{display:flex;align-items:flex-end;gap:10px;padding:12px 16px;border-top:1px solid #0a1a22;flex-shrink:0;background:#000;}
#mi{flex:1;background:#060f18;border:none;border-bottom:1px solid #0066aa;color:#fff;font-family:'Share Tech Mono',monospace;font-size:14px;padding:11px 12px;outline:none;resize:none;max-height:110px;min-height:42px;line-height:1.45;transition:border-color .2s;border-radius:0;}
#mi:focus{border-bottom-color:#00ccff;}
#mi::placeholder{color:#003344;}
.btn-send{background:#00ccff;border:none;color:#000;width:42px;height:42px;border-radius:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;font-weight:bold;transition:opacity .2s;}
.btn-send:active{opacity:.6;}
</style>
</head>
<body>

<div id="conn"><div class="spin"></div><p id="conn-txt">łączenie...</p></div>

<div id="login">
  <div class="logo">VAULT</div>
  <div class="logo-sub">private · real-time · zero setup</div>
  <div class="form">
    <div><div class="lbl">Nazwa kanału</div><input id="ri" class="inp" type="text" placeholder="np. projekt-alfa" autocomplete="off" autocorrect="off" spellcheck="false"></div>
    <div><div class="lbl">Hasło kanału</div><input id="pi" class="inp" type="password" placeholder="••••••••••" autocomplete="new-password"></div>
    <div><div class="lbl">Twój pseudonim</div><input id="ni" class="inp" type="text" placeholder="np. Hawk" maxlength="20" autocomplete="off" autocorrect="off"></div>
    <div class="err" id="ferr"></div>
    <button class="btn-go" id="btn-go" onclick="enterVault()">Wejdź do kanału</button>
  </div>
  <div class="note">te same dane na każdym urządzeniu = wspólny kanał</div>
</div>

<div id="chat">
  <div class="hdr">
    <div class="hdr-l">
      <div class="t">VAULT</div>
      <div class="r" id="ch-room">—</div>
    </div>
    <div class="hdr-r">
      <div class="pres">
        <span class="pres-ico">👥</span>
        <span id="pres-count">1</span>
      </div>
      <div id="pres-names"></div>
      <div id="sdot"></div>
      <button class="btn-exit" onclick="exitVault()">WYJDŹ</button>
    </div>
  </div>
  <div id="msgs">
    <div class="empty" id="empty">
      <div class="empty-i">💬</div>
      <div class="empty-t">kanał gotowy — wyślij pierwszą wiadomość</div>
    </div>
  </div>
  <div class="ch-in">
    <textarea id="mi" placeholder="Wiadomość... (Enter = wyślij)" rows="1"></textarea>
    <button class="btn-send" onclick="sendMsg()">↑</button>
  </div>
</div>

<!-- MQTT.js -->
<script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>
<script>
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Simple hash for topic name
async function makeTopicKey(room, pass) {
  const data = new TextEncoder().encode('vault::' + room + '::' + pass);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return 'vault/' + Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2,'0')).join('').slice(0, 32);
}

let client, myName, topic, presenceTopic, presInterval;
let presenceMap = {};

function setDot(s){ document.getElementById('sdot').className = s; }

// ── ENTER ──────────────────────────────────────────
window.enterVault = async function(){
  const room  = document.getElementById('ri').value.trim();
  const pass  = document.getElementById('pi').value.trim();
  const name  = document.getElementById('ni').value.trim();
  const errEl = document.getElementById('ferr');
  const btn   = document.getElementById('btn-go');
  errEl.textContent = '';

  if (!room){ errEl.textContent = 'podaj nazwę kanału'; return; }
  if (!pass){ errEl.textContent = 'podaj hasło'; return; }
  if (!name){ errEl.textContent = 'podaj pseudonim'; return; }

  btn.disabled = true; btn.textContent = 'Łączenie...';
  document.getElementById('conn').classList.add('on');
  document.getElementById('conn-txt').textContent = 'łączenie z serwerem...';

  myName = name;
  const key  = await makeTopicKey(room, pass);
  topic         = key + '/msg';
  presenceTopic = key + '/pres';

  const clientId = 'vault_' + Math.random().toString(36).slice(2, 10);

  // Connect to HiveMQ public broker over WSS
  client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
    clientId,
    clean: true,
    reconnectPeriod: 3000,
    connectTimeout: 10000,
    keepalive: 30,
    will: {
      topic: presenceTopic,
      payload: JSON.stringify({ name, online: false }),
      qos: 0,
      retain: false
    }
  });

  client.on('connect', () => {
    setDot('ok');
    client.subscribe(topic,         { qos: 0 });
    client.subscribe(presenceTopic, { qos: 0 });

    document.getElementById('conn').classList.remove('on');
    document.getElementById('login').classList.add('hide');
    document.getElementById('chat').classList.add('on');
    document.getElementById('ch-room').textContent = '# ' + room.toUpperCase();
    btn.disabled = false; btn.textContent = 'Wejdź do kanału';

    setupInput();
    announcePresence(true);
    presInterval = setInterval(() => announcePresence(true), 5000);
    prunePres();
  });

  client.on('reconnect', () => setDot(''));
  client.on('error',     () => setDot('err'));
  client.on('offline',   () => setDot('err'));

  client.on('message', (t, payload) => {
    try {
      const msg = JSON.parse(payload.toString());
      if (t === topic)         handleMsg(msg);
      if (t === presenceTopic) handlePres(msg);
    } catch {}
  });

  // Timeout fallback
  setTimeout(() => {
    if (document.getElementById('conn').classList.contains('on')) {
      document.getElementById('conn').classList.remove('on');
      btn.disabled = false; btn.textContent = 'Wejdź do kanału';
      errEl.textContent = 'nie można połączyć — sprawdź internet';
      if (client) client.end(true);
    }
  }, 12000);
};

// ── PRESENCE ─────────────────────────────────────────
function announcePresence(online){
  if (!client || !client.connected) return;
  presenceMap[myName] = Date.now();
  updatePresUI();
  client.publish(presenceTopic, JSON.stringify({ name: myName, online, ts: Date.now() }), { qos: 0 });
}

function handlePres(msg){
  if (!msg || !msg.name) return;
  if (msg.online === false) {
    delete presenceMap[msg.name];
  } else {
    presenceMap[msg.name] = msg.ts || Date.now();
  }
  updatePresUI();
}

function prunePres(){
  setInterval(() => {
    const now = Date.now();
    for (const [n, ts] of Object.entries(presenceMap)){
      if (now - ts > 15000) delete presenceMap[n];
    }
    updatePresUI();
  }, 6000);
}

function updatePresUI(){
  const active = Object.keys(presenceMap);
  document.getElementById('pres-count').textContent = active.length;
  document.getElementById('pres-names').textContent = active.join(', ');
}

// ── MESSAGES ─────────────────────────────────────────
window.sendMsg = function(){
  const inp = document.getElementById('mi');
  const txt = inp.value.trim();
  if (!txt || !client || !client.connected) return;
  inp.value = ''; inp.style.height = 'auto';

  const msg = { text: txt, name: myName, ts: Date.now() };
  // Show immediately
  renderMsg(msg, 'local-' + msg.ts);
  // Send
  client.publish(topic, JSON.stringify(msg), { qos: 0 });
};

const rendered = new Set();
function handleMsg(msg){
  if (!msg || !msg.text || !msg.name) return;
  // Skip own messages (already shown via sendMsg)
  if (msg.name === myName) return;
  renderMsg(msg, msg.name + '_' + msg.ts);
}

function renderMsg(msg, key){
  if (rendered.has(key)) return;
  rendered.add(key);

  const msgs = document.getElementById('msgs');
  document.getElementById('empty')?.remove();

  const isMe = msg.name === myName;
  const time = new Date(msg.ts).toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});

  const w = document.createElement('div');
  w.className = 'mw ' + (isMe ? 'me' : 'them');
  w.dataset.ts = String(msg.ts);
  w.innerHTML =
    `<div class="meta">${esc(msg.name)} <span class="mtime">· ${time}</span></div>` +
    `<div class="mb">${esc(msg.text).replace(/\n/g,'<br>')}</div>`;

  msgs.appendChild(w);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── EXIT ─────────────────────────────────────────────
window.exitVault = function(){
  clearInterval(presInterval);
  announcePresence(false);
  if (client){ client.end(true); client = null; }
  rendered.clear();
  presenceMap = {};
  setDot('');

  document.getElementById('msgs').innerHTML =
    '<div class="empty" id="empty"><div class="empty-i">💬</div><div class="empty-t">kanał gotowy — wyślij pierwszą wiadomość</div></div>';
  document.getElementById('chat').classList.remove('on');
  document.getElementById('login').classList.remove('hide');
  document.getElementById('pres-count').textContent = '1';
  document.getElementById('pres-names').textContent = '';
  document.getElementById('pi').value = '';
  document.getElementById('ferr').textContent = '';
};

// ── INPUT ─────────────────────────────────────────────
function setupInput(){
  const ta = document.getElementById('mi');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight,110)+'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
  });
  setTimeout(() => ta.focus(), 300);
}
['ri','pi','ni'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key==='Enter') enterVault();
  });
});
</script>
</body>
</html>
